apiVersion: v1
kind: Service
metadata:
  name: tomcat-svc
spec:
  selector:
    app: tomcat
  sessionAffinity: ClientIP
  ports:
    - port: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tomcat-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tomcat
  template:
    metadata:
      labels:
        app: tomcat
    spec:
      # [추가] InitContainer: 실행 전 webapps 폴더를 초기화함
      initContainers:
      - name: copy-index
        image: busybox
        command: ['sh', '-c', 'echo "<h1>Welcome to Tomcat Cluster! Host: $HOSTNAME</h1>" > /data/index.jsp']
        volumeMounts:
        - name: app-volume
          mountPath: /data
      containers:
      - name: tomcat
        image: tomcat:9.0
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: app-volume
          mountPath: /usr/local/tomcat/webapps/ROOT # ROOT 폴더로 바로 마운트
        resources:
          requests: { cpu: "200m", memory: "256Mi" }
          limits: { cpu: "400m", memory: "512Mi" }
        livenessProbe:
          tcpSocket: { port: 8080 }
          initialDelaySeconds: 20
      volumes:
      - name: app-volume
        emptyDir: {} # Pod 재시작 시 초기화되는 임시 볼륨
